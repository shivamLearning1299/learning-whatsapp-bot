name: Daily interview-prep WhatsApp message

on:
  schedule:
    # Runs every 2 hours from 09:00 to 23:00 IST (3:30-17:30 UTC, step 2h).
    # IST = UTC + 5:30, so minute stays :30 all day. 8 runs/day: 9AM, 11AM,
    # 1PM, 3PM, 5PM, 7PM, 9PM, 11PM IST.
    - cron: "30 3-17/2 * * *"
  workflow_dispatch: {}   # lets you manually trigger a test run from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit the updated topics.json back

jobs:
  send-daily-concept:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send today's concept
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          MY_WHATSAPP_TO: ${{ secrets.MY_WHATSAPP_TO }}
        run: python send_daily_concept.py

      - name: Commit updated topic pointer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add topics.json
          git diff --staged --quiet || git commit -m "chore: advance daily topic pointer"
          git push
